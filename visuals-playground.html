<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bonsai Visuals Playground · Education Site</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --bg-card: #141414;
    --bg-card-hover: #181818;
    --border: #2a2a2a;
    --border-strong: #3a3a3a;
    --accent: #FF6B35;
    --text: #f0f0f0;
    --text-secondary: #b0b0b0;
    --text-muted: #6a6a6a;
    --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 1fr auto;
    grid-template-areas:
      "sidebar preview"
      "sidebar prompt";
    gap: 1px;
    background: #050505;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    grid-area: sidebar;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }
  .sidebar__header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg-card);
    z-index: 1;
  }
  .sidebar__title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .sidebar__subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.45;
  }
  .sidebar__counter {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    margin-top: 6px;
  }
  .sidebar__group {
    padding: 12px 0 4px;
  }
  .sidebar__group-title {
    padding: 10px 24px 6px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 600;
  }
  .visual-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 24px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.12s;
    user-select: none;
  }
  .visual-item:hover {
    background: var(--bg-card-hover);
  }
  .visual-item--active {
    border-left-color: var(--accent);
    background: var(--bg-card-hover);
  }
  .visual-item__check {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: #0a0a0a;
  }
  .visual-item__check--on {
    background: var(--accent);
    border-color: var(--accent);
  }
  .visual-item__check--on::before {
    content: "";
    width: 8px; height: 4px;
    border-left: 1.6px solid #0a0a0a;
    border-bottom: 1.6px solid #0a0a0a;
    transform: rotate(-45deg) translate(0px, -1px);
  }
  .visual-item__title {
    font-size: 12px;
    color: var(--text-secondary);
    flex: 1;
    line-height: 1.3;
  }
  .visual-item--active .visual-item__title {
    color: var(--text);
    font-weight: 500;
  }

  /* ---------- Preview ---------- */
  .preview {
    grid-area: preview;
    background: var(--bg);
    overflow-y: auto;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }
  .preview__meta {
    margin-bottom: 20px;
    text-align: center;
    max-width: 560px;
  }
  .preview__lesson {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-family: var(--font-mono);
  }
  .preview__title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .preview__description {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  /* Bonsai card — matches the existing site aesthetic */
  .b-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 560px;
  }
  .b-card__eyebrow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 14px;
    font-weight: 600;
  }
  .b-card svg {
    width: 100%;
    height: auto;
    max-height: 340px;
    display: block;
  }
  .b-card__caption {
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .b-card__sub {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ---------- Prompt panel ---------- */
  .prompt-panel {
    grid-area: prompt;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    padding: 14px 24px 18px;
    max-height: 38vh;
    display: flex;
    flex-direction: column;
  }
  .prompt-panel__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 12px;
  }
  .prompt-panel__title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 600;
  }
  .prompt-panel__hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    margin-right: 12px;
  }
  .copy-btn {
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-sans);
    transition: opacity 0.15s, transform 0.1s;
  }
  .copy-btn:hover { opacity: 0.92; }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn--copied { background: #4ade80; }
  .prompt-text {
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.55;
    color: var(--text-secondary);
    white-space: pre-wrap;
    background: #0a0a0a;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    overflow-y: auto;
    flex: 1;
  }

  /* ---------- Toolbar ---------- */
  .toolbar {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    align-items: center;
    padding: 6px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .tool-btn {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border-strong);
    padding: 5px 11px;
    border-radius: 5px;
    font-size: 11px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .tool-btn:hover {
    background: var(--bg-card-hover);
    color: var(--text);
  }
  .tool-btn--on {
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
  }
  .tool-btn--on:hover {
    background: var(--accent);
    color: #0a0a0a;
    opacity: 0.92;
  }

  /* Pause state — freeze every animation under .b-paused */
  .b-paused .b-anim-draw,
  .b-paused .b-anim-pulse,
  .b-paused .b-anim-leaf,
  .b-paused [class*="b-anim"],
  .b-paused [style*="animation"] {
    animation-play-state: paused !important;
  }
  .b-paused animateMotion { display: none; }

  /* Grid overlay */
  .b-grid-on {
    background-image:
      linear-gradient(to right, rgba(255, 107, 53, 0.18) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255, 107, 53, 0.18) 1px, transparent 1px);
    background-size: calc(100% / 32) calc(100% / 24);
  }

  /* Reference panel */
  .ref-panel {
    display: none;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    width: 220px;
    flex-shrink: 0;
  }
  .ref-panel--open { display: block; }
  .ref-panel__label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-weight: 600;
    text-align: center;
  }
  .ref-panel svg { width: 100%; height: auto; display: block; }
  .preview__row {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    width: 100%;
    justify-content: center;
  }
  .preview__row > .b-card { max-width: 560px; flex: 1; }

  /* ---------- Bonsai SVG helpers ---------- */
  .b-stroke { stroke: var(--accent); stroke-linecap: round; stroke-linejoin: round; fill: none; }
  .b-soft { stroke: var(--accent); stroke-linecap: round; fill: none; opacity: 0.5; }
  .b-leaf { fill: var(--accent); opacity: 0.45; }
  .b-leaf--strong { fill: var(--accent); opacity: 0.6; }
  .b-text {
    fill: #9a9a9a;
    font-family: var(--font-mono);
    font-size: 9px;
  }
  .b-text-strong {
    fill: var(--accent);
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
  }
  .b-pot-fill { fill: #1a1a1a; }
  .b-dashed { stroke-dasharray: 2 3; }

  /* Animations */
  @keyframes b-draw {
    0%   { stroke-dashoffset: var(--len, 200); }
    25%  { stroke-dashoffset: 0; }
    90%  { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: var(--len, 200); }
  }
  @keyframes b-pulse {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1; }
  }
  @keyframes b-fade-up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes b-leaf-grow {
    0%, 25%  { opacity: 0; transform: scale(0); }
    40%      { opacity: 0.55; transform: scale(1); }
    88%      { opacity: 0.55; transform: scale(1); }
    100%     { opacity: 0; transform: scale(0); }
  }
  @keyframes b-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .b-anim-draw {
    stroke-dasharray: var(--len, 200);
    animation: b-draw 9s ease-in-out infinite;
  }
  .b-anim-pulse {
    animation: b-pulse 3s ease-in-out infinite;
  }
  .b-anim-leaf {
    transform-box: fill-box;
    transform-origin: center;
    animation: b-leaf-grow 9s ease-in-out infinite;
  }

  @media (prefers-reduced-motion: reduce) {
    .b-anim-draw { animation: none; stroke-dashoffset: 0; }
    .b-anim-pulse { animation: none; opacity: 0.85; }
    .b-anim-leaf { animation: none; opacity: 0.55; transform: scale(1); }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar__header">
    <div class="sidebar__title">Bonsai Visuals</div>
    <div class="sidebar__subtitle">Per-page visual concepts in the same aesthetic as the &ldquo;Grown, Not Crafted&rdquo; lesson.</div>
    <div class="sidebar__counter" id="counter">14 of 14 selected</div>
  </div>
  <div id="sidebarList"></div>
</aside>

<main class="preview">
  <div class="preview__meta">
    <div class="preview__lesson" id="previewLesson"></div>
    <div class="preview__title" id="previewTitle"></div>
    <div class="preview__description" id="previewDescription"></div>
  </div>

  <div class="toolbar" role="toolbar" aria-label="Visual controls">
    <button class="tool-btn" id="restartBtn" title="Restart animations from frame 0">↻ Restart</button>
    <button class="tool-btn" id="pauseBtn" title="Pause / play all animations">⏸ Pause</button>
    <button class="tool-btn" id="gridBtn" title="Toggle 32×24 grid overlay">⊞ Grid</button>
    <button class="tool-btn" id="refBtn" title="Show canonical BonsaiVisual reference">◫ Reference</button>
  </div>

  <div class="preview__row">
    <div class="b-card" id="cardWrap">
      <p class="b-card__eyebrow" id="cardEyebrow"></p>
      <div id="cardSvg"></div>
      <p class="b-card__caption" id="cardCaption"></p>
      <p class="b-card__sub" id="cardSub"></p>
    </div>
    <aside class="ref-panel" id="refPanel" aria-label="Canonical bonsai reference">
      <div class="ref-panel__label">canonical BonsaiVisual</div>
      <svg viewBox="0 0 160 130" xmlns="http://www.w3.org/2000/svg" aria-label="Canonical bonsai reference">
        <!-- Pot -->
        <path d="M62 110 L98 110 L100 124 L60 124 Z" fill="#1a1a1a" stroke="#FF6B35" stroke-opacity="0.5" stroke-width="1.2"/>
        <line x1="58" y1="110" x2="102" y2="110" stroke="#FF6B35" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="64" y1="113" x2="96" y2="113" stroke="#9a9a9a" stroke-width="0.8" stroke-dasharray="1.5 2"/>
        <!-- Trunk -->
        <path class="b-stroke b-anim-draw" style="--len: 120; stroke-width: 3.5"
              d="M80 110 Q76 95 82 80 Q88 65 78 50 Q72 38 86 28"/>
        <!-- Branches -->
        <path class="b-stroke b-anim-draw" style="--len: 40; stroke-width: 2; animation-delay: 0.3s" d="M81 80 Q70 78 58 82"/>
        <path class="b-stroke b-anim-draw" style="--len: 50; stroke-width: 2; animation-delay: 0.6s" d="M83 62 Q98 56 112 44"/>
        <path class="b-stroke b-anim-draw" style="--len: 36; stroke-width: 2; animation-delay: 0.9s" d="M77 44 Q66 38 60 32"/>
        <!-- Leaves -->
        <circle cx="56" cy="80" r="6" class="b-leaf b-anim-leaf" style="animation-delay: 1.0s"/>
        <circle cx="60" cy="76" r="4" class="b-leaf b-anim-leaf" style="animation-delay: 1.1s"/>
        <circle cx="58" cy="32" r="5" class="b-leaf b-anim-leaf" style="animation-delay: 1.2s"/>
        <circle cx="62" cy="28" r="4" class="b-leaf b-anim-leaf" style="animation-delay: 1.3s"/>
        <circle cx="84" cy="26" r="6" class="b-leaf b-anim-leaf" style="animation-delay: 1.0s"/>
        <circle cx="88" cy="22" r="4" class="b-leaf b-anim-leaf" style="animation-delay: 1.2s"/>
        <circle cx="114" cy="42" r="6" class="b-leaf b-anim-leaf" style="animation-delay: 1.0s"/>
        <circle cx="118" cy="38" r="4" class="b-leaf b-anim-leaf" style="animation-delay: 1.1s"/>
      </svg>
    </aside>
  </div>
</main>

<footer class="prompt-panel">
  <div class="prompt-panel__header">
    <div class="prompt-panel__title">Implementation prompt</div>
    <div class="prompt-panel__hint">paste back into Claude to build the selected visuals</div>
    <button class="copy-btn" id="copyBtn">Copy</button>
  </div>
  <pre class="prompt-text" id="promptText"></pre>
</footer>

<script>
// =============================================================================
// SHARED MOTIF HELPERS
// =============================================================================
// Standard bonsai grammar pieces. Every visual that hand-rolls a pot or a
// single leaf should call these instead, so the visual language stays
// consistent across all 14 cards.
//
// All helpers return SVG markup as strings, designed to be interpolated
// inside template literals.
// =============================================================================

// Trapezoidal pot + rim line + dashed soil line. Mirrors BonsaiVisual.tsx
// lines 164–173 exactly. The defaults reproduce the canonical 48×18 pot.
function pot({ cx, y, w = 48, strokeOpacity = 0.55 }) {
  const half = w / 2;
  const h = w * 0.375;
  const rimL = cx - half - 4;
  const rimR = cx + half + 4;
  const soilL = cx - half + 4;
  const soilR = cx + half - 4;
  return `
    <g>
      <path d="M${cx - half} ${y} L${cx + half} ${y} L${cx + half + 2} ${y + h} L${cx - half - 2} ${y + h} Z"
            class="b-pot-fill b-stroke" stroke-width="1.2" stroke-opacity="${strokeOpacity}"/>
      <line x1="${rimL}" y1="${y}" x2="${rimR}" y2="${y}"
            class="b-stroke" stroke-width="1.5" stroke-opacity="${strokeOpacity + 0.05}"/>
      <line x1="${soilL}" y1="${y + 3}" x2="${soilR}" y2="${y + 3}"
            stroke="#9a9a9a" stroke-width="0.8" stroke-dasharray="1.5 2"/>
    </g>
  `;
}

// 2- or 3-circle layered leaf cluster. Replaces single-circle "leaves" in
// most visuals. Each circle gets a +0.1s staggered animation-delay.
function leafCluster({ cx, cy, size = 'md', delay = 1.0, strong = false }) {
  const sizes = {
    sm: [{ r: 4, dx: 0,  dy: 0  }, { r: 3, dx: 3,  dy: -2 }],
    md: [{ r: 6, dx: 0,  dy: 0  }, { r: 4, dx: 4,  dy: -3 }],
    lg: [{ r: 7, dx: 0,  dy: 0  }, { r: 5, dx: 5,  dy: -3 }, { r: 3, dx: -4, dy: -2 }],
  };
  return sizes[size].map((c, i) => {
    const cls = (strong && i === 0) ? 'b-leaf--strong b-anim-leaf' : 'b-leaf b-anim-leaf';
    return `<circle cx="${cx + c.dx}" cy="${cy + c.dy}" r="${c.r}" class="${cls}" style="animation-delay: ${(delay + i * 0.1).toFixed(2)}s"/>`;
  }).join('');
}

// Standalone dashed ground line — for visuals that need a "soil" anchor
// without a full pot.
function soilLine({ cx, y, w = 40 }) {
  return `<line x1="${cx - w / 2}" y1="${y}" x2="${cx + w / 2}" y2="${y}"
                stroke="#9a9a9a" stroke-width="0.8" stroke-dasharray="1.5 2"/>`;
}

// Concentric translucent halo glow.
function halo({ cx, cy, r, pulse = false }) {
  const cls = pulse ? 'b-anim-pulse' : '';
  return `
    <circle cx="${cx}" cy="${cy}" r="${(r * 1.6).toFixed(1)}" fill="#FF6B35" opacity="0.07" class="${cls}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="#FF6B35" opacity="0.15"/>
  `;
}

// Stroke-hierarchy helpers — enforce trunk/branch/twig widths.
function trunk({ d, len = 120, delay = 0 }) {
  return `<path d="${d}" class="b-stroke b-anim-draw" stroke-width="3.5"
                style="--len: ${len}; animation-delay: ${delay}s"/>`;
}
function branch({ d, len = 50, delay = 0 }) {
  return `<path d="${d}" class="b-stroke b-anim-draw" stroke-width="2"
                style="--len: ${len}; animation-delay: ${delay}s"/>`;
}
function twig({ d, len = 30, delay = 0 }) {
  return `<path d="${d}" class="b-stroke b-anim-draw" stroke-width="1.2"
                style="--len: ${len}; animation-delay: ${delay}s"/>`;
}

// =============================================================================
// VISUAL DEFINITIONS
// =============================================================================
// Each visual produces an inner SVG string. Wrapper sets viewBox.
//
// Aesthetic conventions (mirror BonsaiVisual.tsx):
//   - dark card background, accent #FF6B35 strokes
//   - organic Q-bezier curves, stroke-linecap="round"
//   - draw-on animation via stroke-dasharray + b-anim-draw class
//   - eyebrow text top-left, caption + sub below
//   - leaves are layered circle clusters with opacity 0.45–0.6
//   - call the helpers above for pot, leafCluster, soilLine, halo, trunk
// =============================================================================

const VISUALS = [

// ─── 1. Welcome ─────────────────────────────────────────────────────
{
  id: 'apprentice-sapling',
  componentName: 'ApprenticeSapling',
  lesson: 'preface/welcome',
  groupTitle: 'Preface',
  title: 'Apprentice Sapling',
  eyebrow: 'A junior teammate, not a search engine',
  caption: 'AI as an apprentice you guide, not a tool you query',
  sub: 'cupped hands hold the sapling · a guiding hand shapes from above',
  description: 'A sapling in cupped hands with a guiding/pointing hand above it. Anchors the workshop pact: treat AI like a junior teammate.',
  viewBox: '0 0 320 240',
  svg: `
    <!-- Cupped hands -->
    <path d="M70 190 Q100 165 130 162 L190 162 Q220 165 250 190 Q240 212 200 215 L120 215 Q80 212 70 190 Z"
          class="b-pot-fill b-stroke" stroke-width="1.8"/>
    <!-- Crease lines on hands -->
    <path d="M90 195 Q110 200 130 200" class="b-soft" stroke-width="1"/>
    <path d="M190 200 Q210 200 230 195" class="b-soft" stroke-width="1"/>

    <!-- Pot inside hands -->
    <path d="M142 175 L178 175 L182 198 L138 198 Z" class="b-pot-fill b-stroke" stroke-width="1.2" stroke-opacity="0.55"/>
    <line x1="136" y1="175" x2="184" y2="175" class="b-stroke" stroke-width="1.4" stroke-opacity="0.6"/>
    <line x1="142" y1="178" x2="178" y2="178" stroke="#9a9a9a" stroke-width="0.8" stroke-dasharray="1.5 2"/>

    <!-- Sapling -->
    ${trunk({ d: 'M160 175 Q156 150 162 130 Q168 110 158 92', len: 110, delay: 0.2 })}
    <ellipse cx="148" cy="120" rx="6" ry="3" class="b-leaf b-anim-leaf"
             transform="rotate(-30 148 120)" style="animation-delay: 0.8s"/>
    <ellipse cx="172" cy="116" rx="6" ry="3" class="b-leaf b-anim-leaf"
             transform="rotate(30 172 116)" style="animation-delay: 0.9s"/>
    ${leafCluster({ cx: 160, cy: 92, size: 'lg', delay: 1.0, strong: true })}

    <!-- Mentor's guiding hand from above (organic Q-curves instead of straight finger lines) -->
    <g>
      <path d="M210 30 Q212 46 210 62 Q210 70 218 70 L222 70" class="b-stroke" stroke-width="1.5"/>
      <path d="M204 38 Q206 50 204 62" class="b-stroke" stroke-width="1.5"/>
      <path d="M198 44 Q200 54 198 62" class="b-stroke" stroke-width="1.5"/>
      <path d="M193 50 Q195 56 193 62" class="b-stroke" stroke-width="1.5"/>
      <path d="M188 60 Q186 76 200 80 L222 80 Q228 80 228 70 Q230 50 228 30" class="b-stroke" stroke-width="1.5"/>
    </g>

    <!-- Glow at sapling crown from mentorship -->
    ${halo({ cx: 160, cy: 92, r: 14 })}
  `,
},

// ─── 2. Tool Landscape ──────────────────────────────────────────────
{
  id: 'three-trail-mountain',
  componentName: 'ThreeTrailMountain',
  lesson: 'foundations/tool-landscape',
  groupTitle: 'Foundations',

// =============================================================================
// STATE
// =============================================================================
const state = {
  selectedId: VISUALS[0].id,
  included: new Set(VISUALS.map(v => v.id)),
};

// =============================================================================
// RENDERING
// =============================================================================
function renderSidebar() {
  const list = document.getElementById('sidebarList');
  let html = '';
  let lastGroup = null;
  for (const v of VISUALS) {
    if (v.groupTitle !== lastGroup) {
      if (lastGroup !== null) html += '</div>';
      html += `<div class="sidebar__group">`;
      html += `<div class="sidebar__group-title">${escapeHtml(v.groupTitle)}</div>`;
      lastGroup = v.groupTitle;
    }
    const active = v.id === state.selectedId;
    const checked = state.included.has(v.id);
    html += `
      <div class="visual-item ${active ? 'visual-item--active' : ''}" data-id="${v.id}">
        <div class="visual-item__check ${checked ? 'visual-item__check--on' : ''}" data-toggle="${v.id}"></div>
        <div class="visual-item__title">${escapeHtml(v.title)}</div>
      </div>
    `;
  }
  if (lastGroup !== null) html += '</div>';
  list.innerHTML = html;

  // Click row → select; click checkbox → toggle inclusion
  list.querySelectorAll('.visual-item').forEach(el => {
    el.addEventListener('click', (e) => {
      const toggleEl = e.target.closest('[data-toggle]');
      if (toggleEl) {
        const id = toggleEl.getAttribute('data-toggle');
        if (state.included.has(id)) state.included.delete(id);
        else state.included.add(id);
        updateAll();
        return;
      }
      state.selectedId = el.getAttribute('data-id');
      updateAll();
    });
  });

  // Counter
  document.getElementById('counter').textContent =
    `${state.included.size} of ${VISUALS.length} selected`;
}

function renderPreview() {
  const v = VISUALS.find(x => x.id === state.selectedId);
  document.getElementById('previewLesson').textContent = v.lesson;
  document.getElementById('previewTitle').textContent = v.title;
  document.getElementById('previewDescription').textContent = v.description;
  document.getElementById('cardEyebrow').textContent = v.eyebrow;
  document.getElementById('cardCaption').textContent = v.caption;
  document.getElementById('cardSub').textContent = v.sub;
  document.getElementById('cardSvg').innerHTML =
    `<svg viewBox="${v.viewBox}" xmlns="http://www.w3.org/2000/svg" aria-label="${escapeHtml(v.description)}">${v.svg}</svg>`;
}

function updatePrompt() {
  const selected = VISUALS.filter(v => state.included.has(v.id));
  if (selected.length === 0) {
    document.getElementById('promptText').textContent =
      '(no visuals selected — toggle some on in the sidebar)';
    return;
  }

  const intro = `Implement these visual components in the same aesthetic as components/visuals/grown-not-crafted/BonsaiVisual.tsx — dark surface card (var(--color-surface)) with border + rounded-xl, accent color var(--color-accent) for stroke art, organic Q-bezier curves with stroke-linecap="round", animated draw-on via stroke-dasharray + a 9s ease-in-out infinite keyframe, eyebrow text at top, caption text below the SVG, and a prefers-reduced-motion media query that freezes all animation.

Each component follows the same skeleton:
  - 'use client' directive
  - inline <style> with the card layout, animation keyframes, and the reduced-motion media query
  - card div with eyebrow paragraph, an inline SVG, then caption + sub paragraphs

Place new files under components/visuals/lesson/. Wire each into its corresponding lib/lessons/ file by replacing the existing visual key for the relevant section (or by adding a new section if the topic is novel).

Visuals to implement:
`;

  const items = selected.map((v, i) => {
    return `${i + 1}. <${v.componentName}/>  →  ${v.lesson}
   Eyebrow:  "${v.eyebrow}"
   Caption:  "${v.caption}"
   Concept:  ${v.description}
   File:     components/visuals/lesson/${v.componentName}.tsx`;
  }).join('\n\n');

  const outro = `

Use the playground at visuals-playground.html as the visual reference for each one — the SVG markup there is the source of truth. Match the line weights, the curve shapes, and the animation timing.`;

  document.getElementById('promptText').textContent = intro + items + outro;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

function updateAll() {
  renderSidebar();
  renderPreview();
  updatePrompt();
}

// =============================================================================
// EVENTS
// =============================================================================
document.getElementById('copyBtn').addEventListener('click', async () => {
  const btn = document.getElementById('copyBtn');
  try {
    await navigator.clipboard.writeText(document.getElementById('promptText').textContent);
    btn.textContent = 'Copied!';
    btn.classList.add('copy-btn--copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copy-btn--copied');
    }, 1500);
  } catch (err) {
    btn.textContent = 'Failed';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  }
});

// ─── Toolbar: Restart ───
// Re-render the SVG to restart all CSS animations from frame 0.
document.getElementById('restartBtn').addEventListener('click', () => {
  renderPreview();
  // Preserve toolbar state across re-render
  if (state.paused) document.getElementById('cardWrap').classList.add('b-paused');
  if (state.gridOn) document.getElementById('cardSvg').classList.add('b-grid-on');
});

// ─── Toolbar: Pause / Play ───
state.paused = false;
document.getElementById('pauseBtn').addEventListener('click', () => {
  state.paused = !state.paused;
  const btn = document.getElementById('pauseBtn');
  const wrap = document.getElementById('cardWrap');
  if (state.paused) {
    wrap.classList.add('b-paused');
    btn.classList.add('tool-btn--on');
    btn.textContent = '▶ Play';
  } else {
    wrap.classList.remove('b-paused');
    btn.classList.remove('tool-btn--on');
    btn.textContent = '⏸ Pause';
  }
});

// ─── Toolbar: Grid overlay ───
state.gridOn = false;
document.getElementById('gridBtn').addEventListener('click', () => {
  state.gridOn = !state.gridOn;
  const btn = document.getElementById('gridBtn');
  const svgWrap = document.getElementById('cardSvg');
  if (state.gridOn) {
    svgWrap.classList.add('b-grid-on');
    btn.classList.add('tool-btn--on');
  } else {
    svgWrap.classList.remove('b-grid-on');
    btn.classList.remove('tool-btn--on');
  }
});

// ─── Toolbar: Reference panel ───
state.refOpen = false;
document.getElementById('refBtn').addEventListener('click', () => {
  state.refOpen = !state.refOpen;
  const btn = document.getElementById('refBtn');
  const panel = document.getElementById('refPanel');
  if (state.refOpen) {
    panel.classList.add('ref-panel--open');
    btn.classList.add('tool-btn--on');
  } else {
    panel.classList.remove('ref-panel--open');
    btn.classList.remove('tool-btn--on');
  }
});

// Initial render
updateAll();
</script>
